html,body{

body{

/* MAIN SHELL */
.shell{
  max-width:520px;
  width:100%;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  margin-bottom:10px;
}

.logo{
  border-radius:12px;

  box-shadow:
    0 0 22px rgba(192,132,252,.75),
    0 0 46px rgba(126,34,206,.52),
    0 0 70px rgba(90,0,180,.32);
}

/* BERU CARD */
.card{
  position:relative;

  width:100%;

  padding:20px;

  overflow:hidden;

  border-radius:22px;

  border:2px solid rgba(168,85,255,.52);

  background:
    linear-gradient(
    180deg,
    rgba(168,85,255,.13),
    rgba(90,0,180,.08));

  box-shadow:
    0 0 38px rgba(168,85,255,.42),
    0 0 78px rgba(90,0,180,.24),
    inset 0 0 22px rgba(245,232,255,.08),
    0 12px 45px rgba(0,0,0,.82);

  transition:all .35s ease;
}

.card:hover{
  transform:translateY(-3px) scale(1.01);

  box-shadow:
    0 0 54px rgba(192,132,252,.68),
    0 0 110px rgba(126,34,206,.34),
    inset 0 0 30px rgba(245,232,255,.14),
    0 14px 58px rgba(0,0,0,.9);
}

/* BERU SHADOW AURA */
.card::before{
  content:"";

  position:absolute;
  top:-50%;
  left:-50%;

  width:200%;
  height:200%;

  background:
    radial-gradient(circle,
    rgba(192,132,252,.24),
    rgba(168,85,255,.10),
    transparent 70%);

  animation:beruShadowRotate 8s linear infinite;

  filter:blur(30px);

  z-index:0;
}

/* VOID GLOW */
.card::after{
  content:"";

  position:absolute;
  inset:auto -20% -30% auto;

  width:220px;
  height:220px;

  background:
    radial-gradient(circle,
    rgba(126,34,206,.22),
    transparent 70%);

  filter:blur(42px);

  z-index:0;
}

@keyframes beruShadowRotate{
  0%{
    transform:
    translate(-50%,-50%)
    rotate(0deg);
  }

  100%{
    transform:
    translate(-50%,-50%)
    rotate(360deg);
  }
}

/* HERO */
.hero{
  display:flex;
  flex-direction:column;
  gap:16px;
  align-items:center;

  position:relative;
  z-index:1;
}

    0 0 80px rgba(90,0,180,.18);
}

/* CTA */
.cta{
  display:flex;
  gap:12px;
  width:100%;
  justify-content:center;
  flex-wrap:wrap;

  position:relative;
  z-index:1;
}

/* BUTTON */
.btn{
  flex:1 1 45%;

  display:inline-block;

  text-decoration:none;
  text-align:center;

  padding:15px 16px;

  border-radius:14px;

  font-weight:800;
  letter-spacing:.4px;

  color:#fff;

  background:#020005;

  position:relative;

  overflow:hidden;

  transition:all .3s ease;

  z-index:1;
}

/* BERU ROTATING BORDER */
.btn::before{
  content:"";

  position:absolute;
  top:-3px;
  left:-3px;
  right:-3px;
  bottom:-3px;

  background:
    conic-gradient(
    from 0deg,
    var(--shadow-light),
    var(--shadow-neon),
    var(--shadow-purple),
    var(--shadow-deep),
    var(--shadow-violet),
    var(--shadow-light));

  border-radius:16px;

  z-index:-2;

  animation:rotateBeruBorder 3s linear infinite;

  filter:blur(8px);
}

/* INNER */
.btn::after{
  content:"";

  position:absolute;
  inset:3px;

  background:
    linear-gradient(
    180deg,
    #12001f,
    #020005);

  border-radius:12px;

  z-index:-1;
}

.btn:hover{
  transform:translateY(-3px) scale(1.03);

  box-shadow:
    0 0 36px rgba(192,132,252,.88),
    0 0 66px rgba(168,85,255,.48),
    0 0 46px rgba(90,0,180,.36);

  animation:beruPulse 1s infinite;
}

@keyframes rotateBeruBorder{
  to{
    transform:rotate(360deg);
  }
}

@keyframes beruPulse{
  0%{
    box-shadow:
      0 0 26px rgba(168,85,255,.68);
  }

  50%{
    box-shadow:
      0 0 58px rgba(192,132,252,.95),
      0 0 88px rgba(126,34,206,.55),
      0 0 52px rgba(245,232,255,.34);
  }

  100%{
    box-shadow:
      0 0 26px rgba(168,85,255,.68);
  }
}

/* SECTION BUTTONS */
.section-buttons{

  flex-direction:column;

  z-index:1;

.badge{

}

.badge::after{

.badge:hover{
